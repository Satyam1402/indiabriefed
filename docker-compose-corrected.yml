version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: indiabriefed_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: indiabriefed
      MYSQL_USER: indiabriefed_user
      MYSQL_PASSWORD: strongpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - indiabriefed_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: indiabriefed_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # App Settings
      APP_NAME: IndiaBriefed
      APP_ENV: production
      APP_KEY: base64:/IHyrrhcHWDa+XreMbeo1oNMLrM/aDDhGeNQI8lwO4Q=
      APP_DEBUG: "false"
      APP_URL: http://YOUR_SERVER_IP:8000
      APP_TIMEZONE: UTC
      
      # Database
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: indiabriefed
      DB_USERNAME: indiabriefed_user
      DB_PASSWORD: strongpassword
      
      # Cache & Session
      SESSION_DRIVER: database
      SESSION_LIFETIME: 120
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: public
      
      # Logging
      LOG_CHANNEL: stack
      LOG_LEVEL: error
      
      # API Keys
      NEWS_API_KEY: b7d8646df06d457d87745d9e313f2e0e
      GEMINI_API_KEY: AIzaSyCiZ1IY-AKXsAtC2WEr_i6qH4hYRY0iHNg
      
      # Frontend URL
      FRONTEND_URL: http://YOUR_SERVER_IP:3000
    volumes:
      - ./backend/storage:/var/www/html/storage
      - ./backend/bootstrap/cache:/var/www/html/bootstrap/cache
    ports:
      - "8000:80"
    networks:
      - indiabriefed_network
    command: >
      sh -c "
        echo 'Waiting for MySQL to be ready...' &&
        sleep 10 &&
        echo 'Running migrations...' &&
        php artisan migrate --force &&
        echo 'Seeding database...' &&
        php artisan db:seed --force &&
        echo 'Creating storage link...' &&
        php artisan storage:link &&
        echo 'Caching configuration...' &&
        php artisan config:cache &&
        php artisan route:cache &&
        php artisan view:cache &&
        echo 'Starting Apache...' &&
        apache2-foreground
      "

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: indiabriefed_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://YOUR_SERVER_IP:8000/api/v1
    ports:
      - "3000:3000"
    networks:
      - indiabriefed_network

volumes:
  mysql_data:
    driver: local

networks:
  indiabriefed_network:
    driver: bridge
